<div id="game">

    <!-- Background -->
    <img
        src="assets/images/background.png"
        id="gameBackground"
        alt="Game Background"
    >

    <!-- HUD -->
    <div id="hud">

        <div id="gameInfo">

            <div id="level">
                🏴‍☠️ LEVEL <span id="levelValue">1</span>
            </div>

            <div id="score">
                💰 SCORE <span id="scoreValue">0</span>
            </div>

            <div id="bestScore">
                👑 BEST SCORE <span id="bestScoreValue">0</span>
            </div>

        </div>

        <div id="gameControls">

            <button
                id="pauseButton"
                type="button"
                aria-label="Pause game"
            >
                ⏸
            </button>

        </div>

    </div>

    <!-- Chests -->
    <div id="chests">

        <div class="chest-box" id="box1">

            <img
                src="assets/images/chest-closed.png"
                class="chest"
                id="chest1"
                alt="Chest 1"
            >

        </div>

        <div class="chest-box" id="box2">

            <img
                src="assets/images/chest-closed.png"
                class="chest"
                id="chest2"
                alt="Chest 2"
            >

        </div>

        <div class="chest-box" id="box3">

            <img
                src="assets/images/chest-closed.png"
                class="chest"
                id="chest3"
                alt="Chest 3"
            >

        </div>

    </div>

    <!-- Score animation -->
    <div id="scorePopup">
        +100
    </div>

    <!-- Level complete animation -->
    <div id="levelBanner">
        LEVEL COMPLETE!
    </div>

    <!-- Pause, Settings, Game Over and Victory panel -->
    <div id="uiOverlay">

        <div id="uiPanel">

            <img
                src="assets/images/parchment.png"
                alt="Parchment"
            >

            <div id="uiContent">
               

                <h2 id="uiTitle"></h2>

                <p id="uiMessage"></p>

                <div id="uiButtons"></div>
                 <div id="pageNumber"></div>
                <div id="uiButtons"></div>

            </div>

        </div>

    </div>

</div>
